<!-- mixednuts Inc. wordmark (monochrome, currentColor) -->
<!-- Designed for mix-blend-mode: difference compatibility. Peanut 'i' character + text. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="currentColor" stroke="none">
  <!-- Text before the 'i' position: "m" -->
  <text x="0" y="64" font-family="'Archivo', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="900" letter-spacing="-2">m</text>

  <!-- Peanut character replacing "i" (monochrome) -->
  <g transform="translate(52, 18)">
    <!-- Red accent dot on top (kept as is, outside current color) -->
    <path d="M 12 -6 Q 20 -3 17 8 Q 13 14 7 8 Q 4 0 12 -6 Z" fill="#B22C3E" />
    <!-- Peanut body: two overlapping ellipses outlined -->
    <ellipse cx="12" cy="22" rx="9" ry="12" fill="none" stroke="currentColor" stroke-width="3"/>
    <ellipse cx="12" cy="45" rx="11" ry="13" fill="none" stroke="currentColor" stroke-width="3"/>
    <!-- Horizontal grid lines -->
    <line x1="3" y1="22" x2="21" y2="22" stroke="currentColor" stroke-width="2.5"/>
    <line x1="2" y1="33" x2="22" y2="33" stroke="currentColor" stroke-width="2.5"/>
    <line x1="1" y1="45" x2="23" y2="45" stroke="currentColor" stroke-width="2.5"/>
    <line x1="2" y1="55" x2="22" y2="55" stroke="currentColor" stroke-width="2.5"/>
    <!-- Vertical center line -->
    <line x1="12" y1="10" x2="12" y2="57" stroke="currentColor" stroke-width="2.5"/>
  </g>

  <!-- Rest of wordmark: "xed nuts inc." -->
  <text x="84" y="64" font-family="'Archivo', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="900" letter-spacing="-2">xed nuts inc.</text>
</svg>
